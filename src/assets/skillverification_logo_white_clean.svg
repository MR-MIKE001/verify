<svg width="400" height="160" viewBox="0 0 400 160" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SkillVerification logo — white, transparent background</title>
<desc>White version of the SkillVerification logo with shield mark and wordmark only, no background, for use on dark surfaces</desc>

<!-- Shield mark -->
<g transform="translate(200,52)">
  <path d="M0,-42 L36,-20 L36,16 Q36,44 0,58 Q-36,44 -36,16 L-36,-20 Z" fill="white" opacity="0.15"/>
  <path d="M0,-42 L36,-20 L36,16 Q36,44 0,58 Q-36,44 -36,16 L-36,-20 Z" fill="none" stroke="white" stroke-width="2"/>
  <text x="-14" y="3" font-family="monospace,'Courier New'" font-size="15" font-weight="700" fill="white" opacity="0.7">&lt;/&gt;</text>
  <circle cx="18" cy="-14" r="11" fill="none" stroke="white" stroke-width="2"/>
  <path d="M14 -14 L17 -11 L23 -18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Wordmark -->
<text x="200" y="128" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1.5">Skill<tspan fill="white" opacity="0.7">Verification</tspan></text>

</svg>
